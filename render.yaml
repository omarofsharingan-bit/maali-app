databases:
  - name: maali-db
    databaseName: maali
    user: maali
    plan: free

services:
  - type: web
    name: maali-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: maali-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # set manually in Render dashboard so it never leaks to git
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
